<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Apex GPA Calculator - Calculate your GPA/SGPA with a beautiful, interactive, and responsive interface. Dark mode, real-time calculations, and performance insights.">
    <title>Apex GPA & SGPA Calculator</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo-area">
                <div class="logo-icon">
                    <i data-lucide="graduation-cap"></i>
                </div>
                <div>
                    <h1>Apex GPA <span>Calculator</span></h1>
                    <p class="subtitle">Calculate your SGPA and GPA with precision and style</p>
                </div>
            </div>
            <button id="theme-toggle" class="icon-btn" aria-label="Toggle Theme">
                <i data-lucide="sun" class="sun-icon"></i>
                <i data-lucide="moon" class="moon-icon"></i>
            </button>
        </header>

        <main class="app-content">
            <div class="calculator-grid">
                <!-- Left Side: Inputs & Subject List -->
                <div class="calculator-left">
                    <section class="card input-card" id="input-section">
                        <div class="card-header">
                            <i data-lucide="plus-circle" class="header-icon"></i>
                            <h2>Add New Subject</h2>
                        </div>
                        <form id="add-subject-form" class="subject-form">
                            <div class="form-group flex-2">
                                <label for="subject-name">Subject Name</label>
                                <div class="input-wrapper">
                                    <i data-lucide="book-open" class="input-icon"></i>
                                    <input type="text" id="subject-name" placeholder="e.g. Data Structures" required>
                                </div>
                            </div>
                            
                            <div class="form-group flex-1">
                                <label for="subject-grade">Grade</label>
                                <div class="input-wrapper">
                                    <i data-lucide="award" class="input-icon"></i>
                                    <select id="subject-grade" required>
                                        <option value="" disabled selected>Grade</option>
                                        <option value="O">O (Outstanding)</option>
                                        <option value="A+">A+ (Excellent)</option>
                                        <option value="A">A (Very Good)</option>
                                        <option value="B+">B+ (Good)</option>
                                        <option value="B">B (Above Average)</option>
                                        <option value="C">C (Average)</option>
                                        <option value="P">P (Pass)</option>
                                        <option value="F">F (Fail)</option>
                                    </select>
                                </div>
                            </div>

                            <div class="form-group flex-1">
                                <label for="subject-credits">Credits</label>
                                <div class="input-wrapper">
                                    <i data-lucide="hash" class="input-icon"></i>
                                    <input type="number" id="subject-credits" min="0.5" max="20" step="0.5" placeholder="e.g. 4" required>
                                </div>
                            </div>

                            <div class="form-group form-submit">
                                <button type="submit" class="primary-btn">
                                    <i data-lucide="plus"></i> Add
                                </button>
                            </div>
                        </form>
                    </section>
                    
                    <section class="card list-card" id="list-section">
                        <!-- Subject List Table will be added here -->
                    </section>
                </div>

                <!-- Right Side: Live Results & Circular Progress -->
                <div class="calculator-right">
                    <section class="card results-card" id="results-section">
                        <!-- Live Results display will be added here -->
                    </section>
                </div>
            </div>
        </main>

        <footer class="app-footer">
            <p>&copy; 2026 Apex Calculator. Designed for academic excellence.</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
